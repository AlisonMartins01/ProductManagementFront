<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Produtos</h1>
    <button mat-flat-button color="primary" routerLink="/products/new">
      <mat-icon>add</mat-icon>
      Novo Produto
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar por nome</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput [formControl]="searchControl" placeholder="Ex: Notebook..." />
    @if (searchControl.value) {
      <button matSuffix mat-icon-button (click)="searchControl.setValue('')">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>

  <div class="table-wrapper">
    @if (isLoading) {
      <div class="loading-overlay">
        <mat-spinner diameter="48"></mat-spinner>
      </div>
    }

    <table mat-table [dataSource]="dataSource" class="products-table">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let product">{{ product.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let product" class="description-cell">
          {{ product.description || '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Preço</th>
        <td mat-cell *matCellDef="let product">
          {{ product.price | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="stockQuantity">
        <th mat-header-cell *matHeaderCellDef>Estoque</th>
        <td mat-cell *matCellDef="let product">
          <span [class.low-stock]="product.stockQuantity <= 5">
            {{ product.stockQuantity }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let product">
          <button mat-icon-button color="primary"
                  [routerLink]="['/products', product.id, 'edit']"
                  matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn"
                  (click)="onDelete(product)"
                  matTooltip="Excluir">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          Nenhum produto encontrado.
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
