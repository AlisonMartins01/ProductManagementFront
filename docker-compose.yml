services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-management-front
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: product-management-api  # imagem gerada pelo projeto .NET
    container_name: product-management-api
    ports:
      - "8080:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
